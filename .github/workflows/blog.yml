name: Daily GEO Blog

# 每天 UTC 02:00 (北京时间 10:00) 自动生成一篇 GEO SEO 博客
# 内容由 scripts/generate-blog.mjs 调 LLM 生成 → 翻译 6 国 → 写入 src/content/blog/
# 自动 commit + push，触发 Vercel 重新部署

on:
  schedule:
    # 每天 02:00 UTC (北京时间 10:00)
    - cron: '0 2 * * *'
  workflow_dispatch:
    # 允许手动触发（GitHub UI → Actions → Daily GEO Blog → Run workflow）
    inputs:
      topic:
        description: 'Blog topic (English)'
        required: false
        default: ''
      keywords:
        description: 'Target keywords (comma-separated)'
        required: false
        default: ''

# 允许 workflow 自动 commit + push 生成的内容到 master
permissions:
  contents: write

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Generate blog
        env:
          LLM_API_URL: ${{ secrets.LLM_API_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          SITE_DOMAIN: ${{ secrets.SITE_DOMAIN }}
          SITE_NAME: ${{ secrets.SITE_NAME }}
          # When inputs are empty (cron trigger), pickTopic() in generate-blog.mjs
          # falls through to topics.json random selection (deduplicated against
          # existing published slugs). Manual workflow_dispatch can pass a topic
          # to force a specific article.
          TOPIC: ${{ github.event.inputs.topic }}
          KEYWORDS: ${{ github.event.inputs.keywords }}
        run: node scripts/generate-blog.mjs

      - name: Verify build
        run: npm run build

      - name: Detect changes
        id: changes
        run: |
          # git add -N 让 untracked 文件进入 diff 范围
          git add -N src/content/blog/
          if git diff --quiet HEAD -- src/content/blog/; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No new blog files generated (LLM may have failed)."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "New blog files detected:"
            git diff --name-only HEAD -- src/content/blog/
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/blog/
          SLUG=$(ls src/content/blog/en/ | head -1 | sed 's/.md$//')
          git commit -m "feat(blog): ${SLUG}"
          git push origin master

      - name: Submit URLs to IndexNow (Bing + Yandex + DuckDuckGo)
        if: steps.changes.outputs.changed == 'true'
        # Wait 60s for Vercel to deploy the new blog post before submitting.
        run: |
          sleep 60
          SLUG=$(ls src/content/blog/en/ | head -1 | sed 's/.md$//')
          # All 6 locales of this new post
          URLS=$(for L in en de fr ja kr cn; do
            echo "\"https://erdosdx.com/${L}/blog/${SLUG}/\""
          done | paste -sd, -)
          # Wrap in a JSON array
          PAYLOAD="[$URLS]"
          echo "Submitting to IndexNow: $PAYLOAD"
          curl -sS -X POST "https://erdosdx.com/api/indexnow" \
            -H "Content-Type: application/json" \
            -d "{\"urls\":${PAYLOAD}}" | tee /tmp/indexnow-resp.json
          STATUS=$(node -e "const r=require('/tmp/indexnow-resp.json');console.log(r.ok?'OK':'FAIL')")
          echo "::notice title=IndexNow::$STATUS"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Daily GEO blog generation failed. Check the run logs at ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
